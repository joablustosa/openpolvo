# electron-builder — configuração de packaging do Open Polvo (desktop)
#
# Nesta versão, o desktop é **apenas o cliente** (UI Electron/Vite).
# Backend Go e Intelligence rodam **remotos** (web) e não são empacotados.

appId: com.openpolvo.app
productName: Open Polvo
copyright: Open Polvo

# Actualizações automáticas (electron-updater). Ajuste owner/repo ao seu GitHub.
# Em CI use GH_TOKEN com permissão de escrita em Releases.
publish:
  provider: github
  owner: open-polvo
  repo: opel-la-ele

# Ícone da app (PNG; o electron-builder gera .ico para Windows quando necessário)
icon: src/assets/oficial_logo.png

# Recursos extra do builder (NSIS scripts, etc.); ícones vêm de `icon` acima
directories:
  buildResources: build
  output: dist-electron-0.1.4

# Ficheiros a incluir no asar
files:
  - dist/**
  - electron/**
  - "!electron/**/*.map"
  - node_modules/**
  - package.json
  # Ícone em runtime (tray + janela): copiado pelo build-desktop-artifacts.ps1
  - build/icon.png

# ── Windows ────────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
  forceCodeSigning: false
  # Evita assinar cada .exe em resources/ (requer extrair winCodeSign com symlinks no Windows).
  signAndEditExecutable: false
  # Solicita permissões de administrador apenas para o instalador
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  # installerIcon/uninstallerIcon omitidos: evitam dependência de build/icon.ico (ficheiro em falta quebrava o NSIS).
  # Criar atalho no arranque (o utilizador pode desactivar nas definições)
  createStartMenuShortcut: true
  createDesktopShortcut: true
  # Script personalizado para criar os ficheiros .env iniciais
  # include: build/installer.nsh

# ── macOS ──────────────────────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  sign: false

# ── Linux ──────────────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office
